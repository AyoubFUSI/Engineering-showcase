  applyLang() {
    const dict = this.T[this.lang];
    const root = this.root || document;
    root.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (dict[k] != null) el.innerHTML = dict[k];
    });
    if (this.langBtn) this.langBtn.textContent = this.lang === 'en' ? 'DE' : 'EN';
    document.documentElement.lang = this.lang;
    this.typeset();
  }

  typeset() {
    const root = this.root;
    const run = () => requestAnimationFrame(() => {
      const arg = root ? [root] : undefined;
      window.MathJax.typesetPromise(arg).catch(() => {});
    });
    const wait = () => {
      const MJ = window.MathJax;
      if (MJ && MJ.startup && MJ.startup.promise) MJ.startup.promise.then(run);
      else if (MJ && MJ.typesetPromise) run();
      else setTimeout(wait, 100);
    };
    wait();
  }

  toggle = () => { this.lang = this.lang === 'en' ? 'de' : 'en'; this.applyLang(); };

  // ── plot (fully imperative, no setState → single render) ──
  fmt(n) { return (Math.round(n * 100) / 100).toString(); }
  syncOut() {
    if (this.hOutEl) this.hOutEl.textContent = this.fmt(this.h) + ' mm';
    if (this.dpOutEl) this.dpOutEl.textContent = this.fmt(this.dpdx) + ' Pa/m';
    if (this.muOutEl) this.muOutEl.textContent = this.fmt(this.mu) + ' mPa\u00b7s';
    if (this.umaxOutEl) {
      const umax = Math.abs(this.dpdx) * Math.pow(this.h / 1000, 2) / (2 * (this.mu / 1000));
      this.umaxOutEl.textContent = umax.toFixed(3);
    }
  }
  setH = (e) => { this.h = parseFloat(e.target.value); this.syncOut(); this.draw(); };
  setDp = (e) => { this.dpdx = parseFloat(e.target.value); this.syncOut(); this.draw(); };
  setMu = (e) => { this.mu = parseFloat(e.target.value); this.syncOut(); this.draw(); };

  rootRef = (el) => { this.root = el; };
  langBtnRef = (el) => { this.langBtn = el; };
  hOut = (el) => { this.hOutEl = el; this.syncOut(); };
  dpOut = (el) => { this.dpOutEl = el; this.syncOut(); };
  muOut = (el) => { this.muOutEl = el; this.syncOut(); };
  umaxOut = (el) => { this.umaxOutEl = el; this.syncOut(); };
  canvasRef = (el) => { this.canvas = el; if (el) requestAnimationFrame(() => this.draw()); };
  codeRef = (el) => { this.code = el; if (el) this.renderCode(); };

  renderCode() {
    const el = this.code;
    if (!el) return;
    const src = [
      ['c','import numpy as np'],
      ['',''],
      ['k','def ','f','solve_tdma','p','(a, b, c, d):'],
      ['s','    """Solve a tridiagonal system Ax = d via the Thomas algorithm."""'],
      ['n','    n = len(d)'],
      ['n','    w = np.zeros(n-1, float)'],
      ['n','    g = np.zeros(n, float)'],
      ['n','    u = np.zeros(n, float)'],
      ['',''],
      ['c','    # forward sweep'],
      ['n','    w[0] = c[0] / b[0]'],
      ['n','    g[0] = d[0] / b[0]'],
      ['k','    for ','n','i ','k','in ','f','range','p','(1, n-1):'],
      ['n','        w[i] = c[i] / (b[i] - a[i-1] * w[i-1])'],
      ['k','    for ','n','i ','k','in ','f','range','p','(1, n):'],
      ['n','        g[i] = (d[i] - a[i-1] * g[i-1]) / (b[i] - a[i-1] * w[i-1])'],
      ['',''],
      ['c','    # back substitution'],
      ['n','    u[n-1] = g[n-1]'],
      ['k','    for ','n','i ','k','in ','f','range','p','(n-1, 0, -1):'],
      ['n','        u[i-1] = g[i-1] - w[i-1] * u[i]'],
      ['k','    return ','n','u'],
      ['',''],
      ['c','# --- physical setup ---'],
      ['n','nodes = 50           ','c','# discrete grid points'],
      ['n','h     = 0.005        ','c','# channel half-width (5 mm)'],
      ['n','mu    = 0.001        ','c','# dynamic viscosity (Pa.s)'],
      ['n','dp_dx = -50.0        ','c','# pressure gradient (Pa/m)'],
      ['',''],
      ['n','y  = np.linspace(-h, h, nodes)'],
      ['n','dy = y[1] - y[0]'],
      ['',''],
      ['c','# --- matrix construction ---'],
      ['n','a = np.ones(nodes - 1)'],
      ['n','b = -2.0 * np.ones(nodes)'],
      ['n','c = np.ones(nodes - 1)'],
      ['n','d = np.ones(nodes) * (dy**2 / mu) * dp_dx'],
      ['',''],
      ['c','# no-slip walls'],
      ['n','b[0] = 1.0;  c[0] = 0.0;  d[0] = 0.0'],
      ['n','b[-1] = 1.0; a[-1] = 0.0; d[-1] = 0.0'],
      ['',''],
      ['c','# --- execution ---'],
      ['n','velocity_profile = solve_tdma(a, b, c, d)'],
    ];
    const col = { c:'#7a7a7d', s:'#597ea3', k:'#2c455d', f:'#416180', p:'#5d5d60', n:'#1d1f20' };
    const frag = document.createDocumentFragment();
    src.forEach(tokens => {
      if (tokens.length === 2 && tokens[0] === '' && tokens[1] === '') { frag.appendChild(document.createElement('br')); return; }
      const line = document.createElement('div');
      line.style.whiteSpace = 'pre';
      for (let i = 0; i < tokens.length; i += 2) {
        const span = document.createElement('span');
        span.style.color = col[tokens[i]] || col.n;
        if (tokens[i] === 'k' || tokens[i] === 'f') span.style.fontWeight = '600';
        span.textContent = tokens[i + 1];
        line.appendChild(span);
      }
      frag.appendChild(line);
    });
    el.innerHTML = '';
    el.style.fontFamily = 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
    el.style.fontSize = '12.5px';
    el.style.lineHeight = '1.65';
    el.appendChild(frag);
  }

  draw() {
    const cv = this.canvas;
    if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = cv.getBoundingClientRect();
    const W = rect.width || 520, H = rect.height || 300;
    cv.width = W * dpr; cv.height = H * dpr;
    const ctx = cv.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    const accent = '#5980a6', accent7 = '#416180', ink = '#1d1f20';
    const div = 'rgba(29,31,32,0.16)';
    const mL = 44, mR = 20, mT = 20, mB = 34;
    const pw = W - mL - mR, ph = H - mT - mB;
    const cx = mL, cy = mT + ph / 2;
    const refHalf = 10;
    const hpx = (this.h / refHalf) * (ph / 2) * 0.92;

    const h = this.h / 1000, mu = this.mu / 1000, dp = -Math.abs(this.dpdx);
    const umax = -1 / (2 * mu) * dp * (h * h);
    const xMax = cx + pw * 0.82;

    ctx.strokeStyle = 'rgba(29,31,32,0.06)'; ctx.lineWidth = 1;
    for (let i = 0; i <= 8; i++) { const gx = cx + (pw * 0.82) * i / 8; ctx.beginPath(); ctx.moveTo(gx, mT); ctx.lineTo(gx, mT + ph); ctx.stroke(); }

    const drawWall = (yy) => {
      ctx.strokeStyle = ink; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx, yy); ctx.lineTo(xMax + 6, yy); ctx.stroke();
      ctx.strokeStyle = 'rgba(29,31,32,0.5)'; ctx.lineWidth = 1;
      const dir = yy < cy ? -1 : 1;
      for (let x = cx; x < xMax + 6; x += 9) { ctx.beginPath(); ctx.moveTo(x, yy); ctx.lineTo(x + 7, yy + dir * 7); ctx.stroke(); }
    };
    drawWall(cy - hpx); drawWall(cy + hpx);

    ctx.strokeStyle = div; ctx.setLineDash([4, 4]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(xMax + 6, cy); ctx.stroke(); ctx.setLineDash([]);

    ctx.strokeStyle = ink; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, cy - hpx - 4); ctx.lineTo(cx, cy + hpx + 4); ctx.stroke();

    const N = 80;
    const pts = [];
    for (let i = 0; i <= N; i++) {
      const yc = -h + (2 * h) * i / N;
      const u = umax * (1 - (yc / h) * (yc / h));
      const px = cx + (u / umax) * (pw * 0.82);
      const py = cy - (yc / (this.h / 1000)) * hpx;
      pts.push([px, py]);
    }
    ctx.beginPath(); ctx.moveTo(cx, pts[0][1]);
    pts.forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.lineTo(cx, pts[pts.length - 1][1]); ctx.closePath();
    ctx.fillStyle = 'rgba(89,128,166,0.14)'; ctx.fill();

    if (this.props.showVectors ?? true) {
      ctx.strokeStyle = accent; ctx.lineWidth = 1;
      for (let i = 6; i < N; i += 8) {
        const p = pts[i];
        ctx.beginPath(); ctx.moveTo(cx, p[1]); ctx.lineTo(p[0], p[1]); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p[0], p[1]); ctx.lineTo(p[0] - 5, p[1] - 3); ctx.lineTo(p[0] - 5, p[1] + 3); ctx.closePath();
        ctx.fillStyle = accent; ctx.fill();
      }
    }

    ctx.strokeStyle = accent7; ctx.lineWidth = 2.5;
    ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1])); ctx.stroke();

    ctx.fillStyle = 'rgba(29,31,32,0.6)'; ctx.font = '10px Barlow, sans-serif';
    ctx.save(); ctx.translate(12, cy); ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'center'; ctx.fillText(this.lang === 'de' ? 'Kanalposition  y' : 'channel position  y', 0, 0); ctx.restore();
    ctx.textAlign = 'center'; ctx.fillText((this.lang === 'de' ? 'Geschwindigkeit  u(y)  ' : 'velocity  u(y)  ') + '\u2192', mL + (pw * 0.82) / 2, H - 8);
    ctx.textAlign = 'left'; ctx.fillStyle = 'rgba(29,31,32,0.45)';
    ctx.fillText(this.lang === 'de' ? 'Rippenwand (Haftbedingung)' : 'fin wall (no-slip)', cx + 4, cy - hpx - 6);
  }

  renderVals() {
    return {
      h: this.h, mu: this.mu, dpdx: this.dpdx,
      setH: this.setH, setDp: this.setDp, setMu: this.setMu,
      toggle: this.toggle,
      rootRef: this.rootRef, langBtnRef: this.langBtnRef,
      hOut: this.hOut, dpOut: this.dpOut, muOut: this.muOut, umaxOut: this.umaxOut,
      canvasRef: this.canvasRef, codeRef: this.codeRef,
    };
  }
